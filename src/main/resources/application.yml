spring:
  application:
    name: sales-api
  
  datasource:
    url: jdbc:h2:mem:salesdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

sales:
  tax-rate: 0.19
  frozen-sale-expiration-hours: 2
  store-name: "Supermarket XYZ"

external:
  product-api:
    base-url: http://localhost:8081/api/v1
    timeout-seconds: 5
    retry-attempts: 3
  customer-api:
    base-url: http://localhost:8082/api/v1
    timeout-seconds: 5
    retry-attempts: 3

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      productApi:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
      customerApi:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
  
  retry:
    instances:
      productApi:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
      customerApi:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
